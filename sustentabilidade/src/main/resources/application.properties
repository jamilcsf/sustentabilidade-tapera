# Nome da aplicaçăo
spring.application.name=sustentabilidade

# Configuraçăo de conexăo com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sustentabilidade_db
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURAÇŐES DO FLYWAY
# Desativa a criaçăo automática do Hibernate (o Flyway assume isso)
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Logs para facilitar o debug
spring.jpa.show-sql=true