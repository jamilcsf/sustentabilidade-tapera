# Nome da aplicaçăo
spring.application.name=sustentabilidade

# Configuraçăo de conexăo com o PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/sustentabilidade_db
spring.datasource.username=postgres
spring.datasource.password=jamil123
spring.datasource.driver-class-name=org.postgresql.Driver

# CONFIGURAÇŐES DO FLYWAY
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# --- AJUSTES PARA OTIMIZAÇĂO E LIMPEZA DE LOGS ---

# 1. Remove aquele warning que apareceu no seu console
spring.jpa.open-in-view=false

# 2. Formata o SQL para ficar mais legível no console (opcional, mas ajuda muito)
spring.jpa.properties.hibernate.format_sql=true

# Logs para facilitar o debug
spring.jpa.show-sql=true