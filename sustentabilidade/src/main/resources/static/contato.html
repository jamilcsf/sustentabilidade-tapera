<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4" style="border-radius: var(--border-radius);">
                <h2 class="fw-bold text-center mb-4"><i class="bi bi-envelope-fill text-success"></i> Contato</h2>
                <div id="alerta" class="alert d-none mb-3" role="alert"></div>

                <form id="contatoForm">
                    <div class="mb-3">
                        <label class="form-label">Nome (Opcional)</label>
                        <input type="text" id="nome" class="form-control" placeholder="Seu nome">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail (Opcional)</label>
                        <input type="email" id="email" class="form-control" placeholder="seu@email.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assunto *</label>
                        <input type="text" id="assunto" class="form-control" placeholder="Ex: Sugestão, Dúvida..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mensagem *</label>
                        <textarea id="mensagem" class="form-control" rows="4" maxlength="500" placeholder="Escreva aqui..." required></textarea>
                        <div class="text-end small text-muted mt-1"><span id="contador">0</span>/500 caracteres</div>
                    </div>
                    <button type="submit" id="btnEnviar" class="btn btn-success w-100"><i class="bi bi-send me-2"></i>Enviar Mensagem</button>
                </form>

                <div id="telaSucesso" class="text-center d-none py-4">
                    <i class="bi bi-check-circle-fill text-success display-1"></i>
                    <h4 class="fw-bold mt-3">Mensagem Enviada!</h4>
                    <p class="text-muted small">Agradecemos o seu contacto. A nossa equipa irá analisar o seu feedback.</p>
                    <button id="btnNovaMsg" class="btn btn-outline-success btn-sm mt-2">Enviar outra mensagem</button>
                </div>
            </div>
        </div>
    </div>
</main>
