</head>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow p-4" style="border-radius: var(--border-radius);">
                <h2 class="fw-bold text-center mb-4">Criar Conta</h2>
                <div id="alerta" class="alert d-none mb-3" role="alert"></div>

                <form id="cadastroForm" novalidate>
                    <div class="mb-3">
                        <label class="form-label">Nome Completo *</label>
                        <input type="text" id="inputNome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">E-mail *</label>
                        <input type="email" id="inputEmail" class="form-control" required>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Senha *</label>
                            <div class="input-group">
                                <input type="password" id="inputSenha" class="form-control" required minlength="6">
                                <button type="button" class="btn btn-outline-secondary btn-ver-senha" data-alvo="inputSenha"><i class="bi bi-eye"></i></button>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Confirmar Senha *</label>
                            <div class="input-group">
                                <input type="password" id="inputConfirmar" class="form-control" required>
                                <button type="button" class="btn btn-outline-secondary btn-ver-senha" data-alvo="inputConfirmar"><i class="bi bi-eye"></i></button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <div class="progress" style="height: 6px;"><div id="barraSenha" class="progress-bar" style="width: 0%;"></div></div>
                        <small id="textoForcaSenha" class="text-muted"></small>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="termos">
                        <label class="form-check-label small" for="termos">Concordo em compartilhar dados anonimizados para fins de pesquisa.</label>
                    </div>

                    <button type="submit" id="btnCadastrar" class="btn btn-success w-100" style="background-color: var(--secondary-color);">Cadastrar</button>
                    <p class="text-center mt-3 mb-0 small">Já tem conta? <a href="login.html">Entrar</a></p>
                </form>
            </div>
        </div>
    </div>
</main>

<footer class="py-4 text-white text-center" style="background-color: var(--dark-color);">
    <p class="mb-0">&copy; 2026 Sustentabilidade Tapera</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = 'http://localhost:8080/api';
    const form = document.getElementById('cadastroForm');
    const alertaEl = document.getElementById('alerta');

    // Alternar visualização da senha
    document.querySelectorAll('.btn-ver-senha').forEach(btn => {
        btn.addEventListener('click', () => {
            const alvo = document.getElementById(btn.dataset.alvo);
            alvo.type = alvo.type === 'password' ? 'text' : 'password';
            btn.querySelector('i').className = alvo.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
        });
    });

    // Medidor simplificado de força da senha
    document.getElementById('inputSenha').addEventListener('input', (e) => {
        const v = e.target.value;
        const pontos = (v.length >= 6) + (v.length >= 10) + /[A-Z]/.test(v) + /[0-9]/.test(v) + /[^A-Za-z0-9]/.test(v);
        const cores = ['bg-danger', 'bg-warning', 'bg-info', 'bg-primary', 'bg-success'];
        const textos = ['Muito fraca', 'Fraca', 'Média', 'Forte', 'Muito forte'];

        document.getElementById('barraSenha').style.width = (pontos * 20) + '%';
        document.getElementById('barraSenha').className = `progress-bar ${cores[pontos-1] || ''}`;
        document.getElementById('textoForcaSenha').textContent = textos[pontos-1] || '';
    });

    function mostrarAlerta(msg, tipo = 'danger') {
        alertaEl.className = `alert alert-${tipo}`;
        alertaEl.textContent = msg;
        alertaEl.classList.remove('d-none');
    }

    // Envio do formulário para a API Java
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertaEl.classList.add('d-none');

        const nome = document.getElementById('inputNome').value.trim();
        const email = document.getElementById('inputEmail').value.trim();
        const senha = document.getElementById('inputSenha').value;

        if (!nome || !email || !senha) return mostrarAlerta('Preencha os campos obrigatórios.');
        if (senha.length < 6) return mostrarAlerta('A senha deve ter pelo menos 6 caracteres.');
        if (senha !== document.getElementById('inputConfirmar').value) return mostrarAlerta('As senhas não coincidem.');

        const btn = document.getElementById('btnCadastrar');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Processando...`;

        try {
            const resp = await fetch(`${API_BASE}/usuarios`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nome, email, senha })
            });

            const data = resp.headers.get('content-type')?.includes('application/json') ? await resp.json() : {};

            if (!resp.ok) {
                throw new Error(data.erro || data.mensagem || data.message || 'Erro no servidor Java.');
            }

            localStorage.setItem('tapera_usuario', JSON.stringify(data.usuario ?? data));
            mostrarAlerta(`Conta criada com sucesso! Redirecionando...`, 'success');
            setTimeout(() => window.location.href = 'login.html', 2000);

        } catch (error) {
            mostrarAlerta(error.message === 'Failed to fetch' ? 'Erro: Não foi possível conectar ao servidor Java.' : error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Cadastrar';
        }
    });
</script>
</body>
</html>
