<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Sustentabilidade Tapera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="meuestilo.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px; border-radius: 15px;">
    <h3 class="text-center mb-4">Criar Conta</h3>
    <form id="formCadastro">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome Completo</label>
            <input type="text" class="form-control" id="nome" placeholder="Seu nome" required>
        </div>
        <div class="mb-3">
            <label for="login" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="login" placeholder="Seu e-mail" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Cadastrar</button>
        <a href="login.html" class="d-block text-center mt-3 text-secondary">Já tem conta? Login</a>
    </form>
</div>

<script>
    document.getElementById('formCadastro').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Mapeando para "email" para coincidir com o DTO Java
        const userData = {
            nome: document.getElementById('nome').value,
            email: document.getElementById('login').value,
            senha: document.getElementById('senha').value
        };

        try {
            const response = await fetch('http://localhost:8080/api/usuarios', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if (response.ok) {
                alert('Usuário cadastrado com sucesso! Agora faça login.');
                window.location.href = 'login.html';
            } else {
                alert('Erro ao cadastrar. Verifique os dados.');
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro de conexão com o servidor.');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
