<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mapa de Denúncias</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="meuestilo.css">
    <style> #mapid { height: 500px; width: 100%; border-radius: 15px; } </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #2c3e50;">
    <div class="container">
        <a class="navbar-brand" href="index.html">Sustentabilidade Tapera</a>
    </div>
</nav>

<div class="container mt-4">
    <div class="service-card p-4">
        <h3>Mapa de Ocorrências</h3>
        <div id="mapid"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('mapid').setView([-27.6810, -48.5620], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    async function carregarMarcadores() {
        const token = localStorage.getItem('token');
        if (!token) { window.location.href = 'login.html'; return; }

        try {
            const resp = await fetch('http://localhost:8080/api/denuncias', {
                headers: { 'Authorization': 'Bearer ' + token }
            });

            const dados = await resp.json();

            dados.forEach(d => {
                // Usando d.lat e d.lng como definido no seu DenunciaResponseDTO
                if (d.lat && d.lng) {
                    L.marker([d.lat, d.lng])
                     .addTo(map)
                     .bindPopup(`<b>${d.titulo}</b><br>${d.tipo}<br>Status: ${d.status}`);
                }
            });
        } catch (err) {
            console.error("Erro ao carregar mapa:", err);
        }
    }

    carregarMarcadores();
</script>
</body>
</html>
