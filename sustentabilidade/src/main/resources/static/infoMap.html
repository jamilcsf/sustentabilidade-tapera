<main class="secondary-page-content container py-5">
    <h1 class="fw-bold mb-4 text-primary"><i class="bi bi-geo-alt-fill me-2"></i> Mapa de Ocorrências</h1>

    <div id="statusMapa" class="alert alert-info d-flex align-items-center gap-2 py-2 mb-3">
        <div class="spinner-border spinner-border-sm"></div><span>Conectando ao servidor Java...</span>
    </div>

    <div id="mapid"></div>

    <div class="mt-4 p-3 bg-light rounded shadow-sm">
        <h5 class="fw-bold">Legenda</h5>
        <p class="mb-1"><i class="bi bi-pin-map-fill text-primary me-2"></i> Azul: Rede de Saneamento / ETE (Fixo)</p>
        <p class="mb-0"><i class="bi bi-exclamation-triangle-fill text-danger me-2"></i> Vermelho: Denúncias Ativas <span id="contadorDenuncias" class="badge bg-danger ms-2">0</span></p>
    </div>
</main>

<footer class="py-4 text-white text-center" style="background-color: var(--dark-color);">&copy; 2026 Sustentabilidade Tapera</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = 'http://localhost:8080/api';

    document.addEventListener('DOMContentLoaded', async () => {
        const map = L.map('mapid').setView([-27.6810, -48.5620], 14);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, attribution: '© Google Satélite' }).addTo(map);

        // Infraestrutura fixa
        L.marker([-27.697115, -48.516961]).addTo(map).bindPopup("<b>Estação de Tratamento (ETE Portal do Ribeirão)</b>");

        const iconeVermelho = L.icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
        });

        const statusEl = document.getElementById('statusMapa');

        try {
            const resp = await fetch(`${API_BASE}/denuncias`);
            if (!resp.ok) throw new Error();

            const data = await resp.json();
            const denuncias = Array.isArray(data) ? data : (data.denuncias ?? []);
            const validas = denuncias.filter(d => d.coordenadas?.lat && d.coordenadas?.lng);

            validas.forEach(d => {
                const dataFmt = d.criadoEm ? new Date(d.criadoEm).toLocaleString('pt-BR') : 'Data não informada';
                L.marker([d.coordenadas.lat, d.coordenadas.lng], { icon: iconeVermelho }).addTo(map)
                    .bindPopup(`<b>${d.titulo ?? 'Sem título'}</b><br><small class="text-muted">${d.tipo ?? 'Ocorrência'}</small><br><p class="my-1">${d.descricao ?? ''}</p><small class="text-muted" style="font-size:0.75em;">${dataFmt}</small>`);
            });

            document.getElementById('contadorDenuncias').textContent = validas.length;
            statusEl.className = 'alert alert-success py-2 mb-3';
            statusEl.innerHTML = `<i class="bi bi-check-circle-fill me-2"></i> ${validas.length} denúncia(s) carregada(s).`;

        } catch {
            statusEl.className = 'alert alert-warning py-2 mb-3';
            statusEl.innerHTML = '<i class="bi bi-exclamation-triangle-fill me-2"></i> Erro ao conectar à API Java (localhost:8080).';
        }
    });
</script>
</body>
