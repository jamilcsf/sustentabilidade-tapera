<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Denúncias | Sustentabilidade Tapera</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="meuestilo.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #2c3e50;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Sustentabilidade Tapera</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="index.html">Início</a>
            <a class="nav-link" href="forum.html">Fórum</a>
            <a class="nav-link" href="denuncia.html">Denunciar</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-12">
            <div class="service-card p-4">
                <h2 class="mb-3">Mapa de Ocorrências</h2>
                <p class="text-muted">Visualização em tempo real das denúncias no bairro Tapera.</p>
                <div id="mapid"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // Inicializa o mapa
    const map = L.map('mapid').setView([-27.6810, -48.5620], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Carrega as denúncias e coloca marcadores
    async function carregarMarcadores() {
        try {
            const resp = await fetch('http://localhost:8080/api/denuncias');
            const dados = await resp.json();

            dados.forEach(d => {
                L.marker([d.lat, d.lng])
                 .addTo(map)
                 .bindPopup(`<b>${d.titulo}</b><br>${d.tipo}<br>Status: ${d.status}`);
            });
        } catch (err) {
            console.error("Erro ao carregar mapa:", err);
        }
    }

    carregarMarcadores();
</script>
</body>
</html>
