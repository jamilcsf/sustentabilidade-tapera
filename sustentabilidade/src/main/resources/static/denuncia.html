<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Denúncia | Sustentabilidade Tapera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="meuestilo.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #2c3e50;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Sustentabilidade Tapera</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">
        <h3 class="mb-4">Nova Denúncia</h3>

        <div class="mb-3">
            <label for="titulo" class="form-label">Título da Ocorrência</label>
            <input type="text" class="form-control" id="titulo" placeholder="Ex: Vazamento de água na rua" required>
        </div>

        <div class="mb-3">
            <label for="tipo" class="form-label">Tipo de Problema</label>
            <select class="form-select" id="tipo">
                <option value="Vazamento de Água">Vazamento de Água</option>
                <option value="Esgoto a Céu Aberto">Esgoto a Céu Aberto</option>
                <option value="Lixo Irregular">Lixo Irregular</option>
            </select>
        </div>

        <div class="mb-3">
            <label for="descricao" class="form-label">Descrição</label>
            <textarea class="form-control" id="descricao" rows="3" placeholder="Descreva o que está acontecendo" required></textarea>
        </div>

        <div class="mb-3">
            <label for="localizacao" class="form-label">Localização</label>
            <input type="text" class="form-control" id="localizacao" placeholder="Ex: Rua das Flores, 100" required>
        </div>

        <div class="mb-3">
            <label for="referencia" class="form-label">Ponto de Referência</label>
            <input type="text" class="form-control" id="referencia" placeholder="Ex: Próximo à padaria">
        </div>

        <div class="row">
            <div class="col-6 mb-3">
                <label for="lat" class="form-label">Latitude</label>
                <input type="number" step="any" class="form-control" id="lat" value="-27.6810" required>
            </div>
            <div class="col-6 mb-3">
                <label for="lng" class="form-label">Longitude</label>
                <input type="number" step="any" class="form-control" id="lng" value="-48.5620" required>
            </div>
        </div>

        <button class="btn btn-primary w-100" onclick="enviar()">Enviar Denúncia</button>
    </div>
</div>

<script>
    // Verificação de autenticação
    if (!localStorage.getItem('token')) {
        alert("Você precisa estar logado!");
        window.location.href = 'login.html';
    }

    async function enviar() {
        const dados = {
            titulo: document.getElementById('titulo').value,
            tipo: document.getElementById('tipo').value,
            descricao: document.getElementById('descricao').value,
            localizacao: document.getElementById('localizacao').value,
            referencia: document.getElementById('referencia').value,
            lat: parseFloat(document.getElementById('lat').value),
            lng: parseFloat(document.getElementById('lng').value)
        };

        const token = localStorage.getItem('token');

        try {
            const resp = await fetch('http://localhost:8080/api/denuncias', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify(dados)
            });

            if(resp.ok) {
                alert('Denúncia registrada com sucesso!');
                window.location.href = 'infoMap.html';
            } else {
                const erro = await resp.json();
                alert('Erro ao registrar: ' + (erro.message || 'Verifique os campos.'));
            }
        } catch (e) {
            console.error(e);
            alert('Erro de conexão com o servidor.');
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
