<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="meuestilo.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Registrar Denúncia</title>
</head>
<body class="p-4">

<nav class="navbar navbar-dark mb-4">
    <div class="container-fluid"><span class="navbar-brand">Sustentabilidade</span></div>
</nav>

<div class="container">
    <div class="service-card p-4 mx-auto" style="max-width: 600px;">
        <h3>Nova Denúncia</h3>
        <div class="mb-3">
            <input type="text" class="form-control" id="titulo" placeholder="Título">
        </div>
        <div class="mb-3">
            <select class="form-control" id="tipo">
                <option value="Vazamento de Água">Vazamento de Água</option>
                <option value="Esgoto a Céu Aberto">Esgoto a Céu Aberto</option>
            </select>
        </div>
        <textarea class="form-control mb-3" id="descricao" placeholder="Descrição"></textarea>
        <button class="btn btn-primary w-100" onclick="enviar()">Enviar Denúncia</button>
    </div>
</div>

<script>
    async function enviar() {
        // Coleta os dados dos inputs
        const dados = {
            titulo: document.getElementById('titulo').value,
            tipo: document.getElementById('tipo').value,
            descricao: document.getElementById('descricao').value,
            // ... adicione o resto
            lat: -27.6810, // Exemplo fixo por enquanto
            lng: -48.5620
        };

        const resp = await fetch('http://localhost:8080/api/denuncias', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        if(resp.ok) alert('Denúncia registrada!');
        else alert('Erro ao registrar.');
    }
</script>
</body>
</html>
