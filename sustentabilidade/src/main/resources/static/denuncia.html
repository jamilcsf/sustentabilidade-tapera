    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container py-4">
    <div class="row g-4">
        <div class="col-lg-5">
            <div class="card shadow-sm p-4">
                <h3 class="fw-bold text-success mb-3"><i class="bi bi-megaphone-fill"></i> Nova Denúncia</h3>
                <form id="formDenuncia">
                    <div class="mb-2"><label class="form-label mb-1">Título</label><input type="text" id="titulo" class="form-control" required></div>
                    <div class="mb-2">
                        <label class="form-label mb-1">Tipo</label>
                        <select id="tipo" class="form-select" required>
                            <option value="Vazamento de Água">Vazamento de Água</option>
                            <option value="Esgoto a Céu Aberto">Esgoto a Céu Aberto</option>
                            <option value="Falta de Água">Falta de Água</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="mb-2"><label class="form-label mb-1">Descrição</label><textarea id="descricao" class="form-control" rows="3" required></textarea></div>
                    <div class="mb-2"><label class="form-label mb-1">Endereço/Referência</label><input type="text" id="localizacao" class="form-control" required></div>

                    <div class="row g-2 mb-3">
                        <div class="col"><input type="text" id="lat" class="form-control form-control-sm" placeholder="Lat" readonly required></div>
                        <div class="col"><input type="text" id="lng" class="form-control form-control-sm" placeholder="Lng" readonly required></div>
                        <small class="text-muted d-block mt-1">Clique no mapa ao lado para definir o local exato.</small>
                    </div>

                    <button type="submit" id="btnEnviar" class="btn btn-success w-100"><i class="bi bi-send-fill me-2"></i>Enviar Denúncia</button>
                </form>
            </div>
        </div>

        <div class="col-lg-7">
            <div id="map" class="rounded shadow-sm mb-4" style="height: 300px;"></div>
            <h4 class="fw-bold mb-3 text-secondary">Minhas Ocorrências</h4>
            <div id="listaDenuncias" class="row g-3"></div>
        </div>
    </div>
</main>

<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div id="liveToast" class="toast align-items-center text-white border-0" role="alert" aria-live="assertive" aria-atomic="true">
        <div class="d-flex"><div class="toast-body" id="toastMsg"></div><button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>
    </div>
</div>

<footer class="py-4 text-white text-center" style="background-color: var(--dark-color);">&copy; 2026 Sustentabilidade Tapera</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = 'http://localhost:8080/api';
    let map, marcador;

    function exibirToast(msg, bg = 'danger') {
        document.getElementById('toastMsg').textContent = msg;
        const toastEl = document.getElementById('liveToast');
        toastEl.className = `toast align-items-center text-white bg-${bg} border-0`;
        bootstrap.Toast.getOrCreateInstance(toastEl).show();
    }

    // Inicializa Mapa e Evento de Clique
    document.addEventListener('DOMContentLoaded', () => {
        map = L.map('map').setView([-27.6810, -48.5620], 14);
        L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20 }).addTo(map);

        map.on('click', (e) => {
            const { lat, lng } = e.latlng;
            document.getElementById('lat').value = lat.toFixed(6);
            document.getElementById('lng').value = lng.toFixed(6);

            if (marcador) map.removeLayer(marcador);
            marcador = L.marker([lat, lng]).addTo(map);
        });

        carregarDenuncias();
    });

    // Buscar denúncias (GET)
    async function carregarDenuncias() {
        try {
            const resp = await fetch(`${API_BASE}/denuncias`);
            const dados = await resp.json();
            const lista = Array.isArray(dados) ? dados : (dados.denuncias ?? []);
            const container = document.getElementById('listaDenuncias');

            container.innerHTML = lista.map(d => `
                <div class="col-md-6">
                    <div class="card h-100 shadow-sm border-start border-danger border-4">
                        <div class="card-body p-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <h6 class="fw-bold mb-1">${d.titulo ?? 'Sem título'}</h6>
                                <button class="btn btn-link text-danger p-0 border-0" onclick="excluirDenuncia('${d.id}')"><i class="bi bi-trash"></i></button>
                            </div>
                            <span class="badge bg-secondary mb-2" style="font-size:0.7em;">${d.tipo}</span>
                            <p class="small text-muted mb-1 text-truncate">${d.descricao}</p>
                            <small class="text-black-50 d-block" style="font-size:0.75em;"><i class="bi bi-geo-alt"></i> ${d.localizacao}</small>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch {
            exibirToast('Erro ao carregar a listagem.');
        }
    }

    // Enviar denúncia (POST)
    document.getElementById('formDenuncia').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnEnviar');
        btn.disabled = true;

        const payload = {
            titulo: document.getElementById('titulo').value.trim(),
            tipo: document.getElementById('tipo').value,
            descricao: document.getElementById('descricao').value.trim(),
            localizacao: document.getElementById('localizacao').value.trim(),
            coordenadas: {
                lat: parseFloat(document.getElementById('lat').value),
                lng: parseFloat(document.getElementById('lng').value)
            }
        };

        try {
            const resp = await fetch(`${API_BASE}/denuncias`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!resp.ok) throw new Error();

            exibirToast('Denúncia enviada com sucesso!', 'success');
            document.getElementById('formDenuncia').reset();
            if (marcador) map.removeLayer(marcador);
            carregarDenuncias();
        } catch {
            exibirToast('Erro ao submeter denúncia.');
        } finally {
            btn.disabled = false;
        }
    });

    // Excluir denúncia (DELETE)
    async function excluirDenuncia(id) {
        if (!confirm('Excluir esta ocorrência?')) return;
        try {
            const resp = await fetch(`${API_BASE}/denuncias/${id}`, { method: 'DELETE' });
            if (!resp.ok) throw new Error();
            exibirToast('Denúncia removida.', 'secondary');
            carregarDenuncias();
        } catch {
            exibirToast('Erro ao deletar.');
        }
    }
</script>
</body>
</html>
