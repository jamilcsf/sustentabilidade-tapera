<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fórum | Sustentabilidade Tapera</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="meuestilo.css">
    <style>
        .service-card { border-radius: 10px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm" style="background-color: #2c3e50;">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Sustentabilidade Tapera</a>
        <div class="collapse navbar-collapse">
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="index.html">Início</a>
                <a class="nav-link active" href="forum.html">Fórum</a>
                <a class="nav-link" href="denuncia.html">Denunciar</a>
            </div>
            <div class="ms-lg-3" id="auth-menu"></div>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Fórum de Discussão</h2>
        <button class="btn btn-primary" onclick="carregarFeed()">Atualizar</button>
    </div>
    <div id="feedForum" class="row">
        <p class="text-center">Carregando...</p>
    </div>
</div>

<script>
    // Gerencia o menu Login/Logout e Proteção de rota
    document.addEventListener("DOMContentLoaded", function() {
        const authMenu = document.getElementById('auth-menu');
        const token = localStorage.getItem('token');

        if (token) {
            authMenu.innerHTML = '<button onclick="logout()" class="btn btn-danger btn-sm">Sair</button>';
        } else {
            // Se não estiver logado, redireciona para login (ou mostra aviso)
            alert("Você precisa estar logado para ver o fórum!");
            window.location.href = 'login.html';
        }
        carregarFeed();
    });

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }

    async function carregarFeed() {
        const feed = document.getElementById('feedForum');
        const token = localStorage.getItem('token');

        try {
            // AQUI ESTÁ O SEGREDO: Enviando o Token na requisição
            const response = await fetch('http://localhost:8080/api/denuncias', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                }
            });

            if (response.status === 403 || response.status === 401) {
                feed.innerHTML = '<p class="text-danger text-center">Sessão expirada. Faça login novamente.</p>';
                return;
            }

            const denuncias = await response.json();

            if (denuncias.length === 0) {
                feed.innerHTML = '<p class="text-center">Nenhuma denúncia registrada ainda.</p>';
                return;
            }

            feed.innerHTML = denuncias.map(d => `
                <div class="col-md-6 mb-3">
                    <div class="service-card p-3">
                        <h5 class="text-primary">${d.titulo}</h5>
                        <p class="mb-1 text-muted"><small>Tipo: ${d.tipo} | Status: <b>${d.status}</b></small></p>
                        <p class="card-text">${d.descricao}</p>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            feed.innerHTML = '<p class="text-danger text-center">Erro ao conectar com o servidor.</p>';
            console.error('Erro:', error);
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
