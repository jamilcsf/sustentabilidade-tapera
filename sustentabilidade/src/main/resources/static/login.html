<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sustentabilidade Tapera</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="meuestilo.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

<div class="card shadow p-4" style="width: 400px; border-radius: 15px;">
    <h3 class="text-center mb-4">Login</h3>
    <form id="formLogin">
        <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input type="email" class="form-control" id="email" placeholder="Seu e-mail" required>
        </div>
        <div class="mb-3">
            <label for="senha" class="form-label">Senha</label>
            <input type="password" class="form-control" id="senha" placeholder="Sua senha" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 mb-3">Entrar</button>
    </form>

    <div class="text-center">
        <p class="mb-0">Não tem uma conta?</p>
        <a href="cadastro.html" class="text-decoration-none">Cadastre-se aqui</a>
    </div>
</div>

<script>
    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Enviando "email" como chave, conforme o AutenticacaoDTO
        const loginData = {
            email: document.getElementById('email').value,
            senha: document.getElementById('senha').value
        };

        try {
            const response = await fetch('http://localhost:8080/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            });

            if (response.ok) {
                const data = await response.json();
                localStorage.setItem('token', data.token);
                alert('Login realizado com sucesso!');
                window.location.href = 'index.html';
            } else {
                alert('E-mail ou senha incorretos.');
            }
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro ao conectar com o servidor.');
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
