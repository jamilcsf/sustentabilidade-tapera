<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sustentabilidade Tapera</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="meuestilo.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #2c3e50;">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">Sustentabilidade Tapera</a>
        <div class="navbar-nav ms-auto"><a class="nav-link" href="index.html">Voltar ao Início</a></div>
    </div>
</nav>
<div class="container py-5">
    <div class="card mx-auto shadow" style="max-width: 400px;">
        <div class="card-body p-4">
            <h3 class="text-center">Login</h3>
            <form id="formLogin">
                <input type="email" id="email" class="form-control mb-3" placeholder="E-mail" required>
                <input type="password" id="senha" class="form-control mb-3" placeholder="Senha" required>
                <button type="submit" class="btn btn-primary w-100">Entrar</button>
            </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
