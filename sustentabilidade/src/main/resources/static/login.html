<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sustentabilidade Tapera - ODS 6</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: var(--dark-color);">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="index.html">
            <img src="img/Logo_cor_branca.png" alt="Logo Tapera" class="navbar-logo"> Sustentabilidade Tapera
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Início</a></li>
                <li class="nav-item"><a class="nav-link" href="denuncia.html">Denúncia</a></li>
                <li class="nav-item"><a class="nav-link" href="infoMap.html">Mapa</a></li>
                <li class="nav-item"><a class="nav-link" href="forum.html">Fórum</a></li>
                <li class="nav-item"><a class="nav-link" href="perfil.html">Perfil</a></li>
                <li class="nav-item"><a class="nav-link" href="ambiental.html">Ambiental</a></li>
                <li class="nav-item"><a class="nav-link" href="cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link" href="contato.html">Contato</a></li>
                <li class="nav-item"><a class="nav-link active" href="login.html">Login</a></li>
                <li class="nav-item"><a class="nav-link" href="sobre.html">Sobre</a></li>
            </ul>
        </div>
    </div>
</nav>

<main class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px; border-radius: var(--border-radius);">
        <div class="text-center mb-4">
            <i class="bi bi-person-circle display-1 text-primary"></i>
            <h2 class="fw-bold mt-2">Entrar</h2>
            <p class="text-muted">Acesse sua conta para participar</p>
        </div>

        <div id="alerta" class="alert d-none mb-3" role="alert"></div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="seu@email.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" id="senha" class="form-control" placeholder="******" required>
            </div>
            <button type="submit" id="btnEntrar" class="btn btn-primary w-100 mb-3" style="background-color: var(--primary-color);">Entrar</button>
            <div class="text-center">
                <p class="small mb-0">Não tem conta? <a href="cadastro.html" class="text-decoration-none">Cadastre-se aqui</a></p>
            </div>
        </form>
    </div>
</main>

<footer class="py-4 text-white text-center" style="background-color: var(--dark-color);">&copy; 2026 Sustentabilidade Tapera</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_BASE = 'http://localhost:8080/api';
    const form = document.getElementById('loginForm');
    const alertaEl = document.getElementById('alerta');

    function mostrarAlerta(msg, tipo = 'danger') {
        alertaEl.className = `alert alert-${tipo} py-2 small`;
        alertaEl.textContent = msg;
        alertaEl.classList.remove('d-none');
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        alertaEl.classList.add('d-none');

        const email = document.getElementById('email').value.trim();
        const senha = document.getElementById('senha').value;
        const btn = document.getElementById('btnEntrar');

        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span> Autenticando...`;

        try {
            // Rota REST padrão Java para login/autenticação
            const resp = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, senha })
            });

            const data = resp.headers.get('content-type')?.includes('application/json') ? await resp.json() : {};

            if (!resp.ok) {
                throw new Error(data.erro || data.mensagem || data.message || 'Credenciais inválidas.');
            }

            // Armezena o token JWT e os dados do usuário retornados pelo Spring Boot
            if (data.token) localStorage.setItem('tapera_token', data.token);
            localStorage.setItem('tapera_usuario', JSON.stringify(data.usuario ?? data));

            mostrarAlerta('Login efetuado com sucesso! Redirecionando...', 'success');
            setTimeout(() => window.location.href = 'index.html', 1500);

        } catch (error) {
            mostrarAlerta(error.message === 'Failed to fetch' ? 'Não foi possível conectar ao servidor Java.' : error.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Entrar';
        }
    });
</script>
</body>
</html>
